approval_policy = "on-request"
approvals_reviewer = "auto_review"
default_permissions = "workspace_network"
glob_scan_max_depth = 8

[permissions.workspace_network.filesystem]
":minimal" = "read"
":tmpdir" = "write"
":slash_tmp" = "write"
"~/.codex/skills" = "read"

[permissions.workspace_network.filesystem.":workspace_roots"]
"." = "write"
".env" = "deny"
"**/.env" = "deny"

[permissions.workspace_network.network]
enabled = true
